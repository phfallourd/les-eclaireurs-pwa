<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Les Éclaireurs! — Hors ligne</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f0f2f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:24px;padding:40px 32px;max-width:340px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.icon{font-size:48px;margin-bottom:20px;}
.title{font-size:22px;font-weight:800;color:#111827;margin-bottom:10px;}
.title span{color:#f97316;}
.sub{font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:28px;}
.info{background:#eff4ff;border:1px solid rgba(37,99,235,0.15);border-radius:12px;padding:14px;font-size:13px;color:#2563eb;font-weight:600;margin-bottom:20px;}
.retry{display:inline-block;background:#2563eb;color:#fff;font-size:14px;font-weight:700;padding:12px 28px;border-radius:12px;text-decoration:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;}
.retry:hover{background:#1d4ed8;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚡</div>
  <h1 class="title">Les Éclaireurs<span>!</span></h1>
  <p class="sub">Tu es hors connexion en ce moment. L'assistant et les hotlines ne sont pas disponibles sans réseau.</p>
  <div class="info">📱 Tes formations récentes et ton profil restent accessibles</div>
  <button class="retry" onclick="window.location.reload()">Réessayer la connexion</button>
</div>
</body>
</html>
